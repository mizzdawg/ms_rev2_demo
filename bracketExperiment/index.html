<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Bracket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bracket-container">
        <div class="bracket-wrapper">
            <div class="bracket-rounds">
                <div class="bracket-round--label">
                    <button class="bracket-round--label-btn">Round of 16</button>
                </div>
                <div class="bracket-round--label">
                    <button class="bracket-round--label-btn">Quaterfinals</button>
                </div>
                <div class="bracket-round--label">
                    <button class="bracket-round--label-btn">Semifinals</button>
                </div>
                <div class="bracket-round--label">
                    <button class="bracket-round--label-btn">Final</button>
                </div>
            </div>
            <div class="bracket">
                <div class="round">
                    <div class="matchup">Team X vs Team Y</div>
                    <div class="matchup">Team X vs Team Y</div>
                    <div class="matchup">Team X vs Team Y</div>
                    <div class="matchup">Team X vs Team Y</div>
                    <div class="matchup">Team X vs Team Y</div>
                    <div class="matchup">Team X vs Team Y</div>
                    <div class="matchup">Team X vs Team Y</div>
                    <div class="matchup">Team X vs Team Y</div>


                </div>
                <div class="round">
                    <div class="matchup">Team X vs Team Y</div>
                    <div class="matchup">Team X vs Team Y</div>
                    <div class="matchup">Team X vs Team Y</div>
                    <div class="matchup">Team X vs Team Y</div>
                </div>
                <div class="round">
                    <div class="matchup">Team X vs Team Y</div>
                    <div class="matchup">Team X vs Team Y</div>
                </div>
                <div class="round">
                    <div class="matchup">Team X vs Team Y</div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
